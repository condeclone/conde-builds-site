<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Personal AI command center example</title>
  <desc id="desc">A sanitized dashboard-style mockup for inventory freshness, review queues, backups, and local memory.</desc>
