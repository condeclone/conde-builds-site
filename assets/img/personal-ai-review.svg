<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Personal AI review queue example</title>
  <desc id="desc">A sanitized review queue mockup showing approve, correct, and defer decisions for AI suggestions.</desc>
  <rect width="1200" height="760" fill="#f7f3ea"/>
  <rect x="82" y="70" width="1036" height="620" rx="24" fill="#202726"/>
  <text x="126" y="140" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850">Human-in-the-loop Review</text>
  <text x="126" y="178" fill="#b8c5c1" font-family="Inter, Arial, sans-serif" font-size="18">AI suggestions become useful only after a person accepts, edits, or rejects them.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="126" y="238" width="948" height="102" rx="14" fill="#fffdf8"/>
    <circle cx="168" cy="289" r="18" fill="#0d6f68"/>
    <text x="206" y="278" fill="#18201f" font-size="22" font-weight="800">Suggested tag: treasury dashboard</text>
    <text x="206" y="310" fill="#56615f" font-size="17">Confidence shown, source retained, no original file changed.</text>
    <rect x="856" y="270" width="88" height="38" rx="8" fill="#0d6f68"/>
    <text x="876" y="295" fill="#fffdf8" font-size="15" font-weight="800">Approve</text>
    <rect x="954" y="270" width="82" height="38" rx="8" fill="#d9d0c2"/>
    <text x="976" y="295" fill="#18201f" font-size="15" font-weight="800">Edit</text>
    <rect x="126" y="370" width="948" height="102" rx="14" fill="#fffdf8"/>
    <circle cx="168" cy="421" r="18" fill="#244c8f"/>
    <text x="206" y="410" fill="#18201f" font-size="22" font-weight="800">Potential duplicate group</text>
    <text x="206" y="442" fill="#56615f" font-size="17">Near-match review waits for confirmation before any cleanup step.</text>
    <rect x="856" y="402" width="88" height="38" rx="8" fill="#244c8f"/>
    <text x="878" y="427" fill="#fffdf8" font-size="15" font-weight="800">Review</text>
    <rect x="954" y="402" width="82" height="38" rx="8" fill="#d9d0c2"/>
    <text x="974" y="427" fill="#18201f" font-size="15" font-weight="800">Defer</text>
    <rect x="126" y="502" width="948" height="102" rx="14" fill="#fffdf8"/>
    <circle cx="168" cy="553" r="18" fill="#b36b16"/>
    <text x="206" y="542" fill="#18201f" font-size="22" font-weight="800">Memory correction</text>
    <text x="206" y="574" fill="#56615f" font-size="17">Corrections are stored as reviewed facts, not hidden prompt changes.</text>
    <rect x="856" y="534" width="88" height="38" rx="8" fill="#b36b16"/>
    <text x="874" y="559" fill="#fffdf8" font-size="15" font-weight="800">Accept</text>
    <rect x="954" y="534" width="82" height="38" rx="8" fill="#d9d0c2"/>
    <text x="970" y="559" fill="#18201f" font-size="15" font-weight="800">Reject</text>
  </g>
</svg>

