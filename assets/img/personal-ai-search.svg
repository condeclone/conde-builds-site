<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Personal AI search example</title>
  <desc id="desc">A sanitized semantic search mockup showing document and image matches with traceable source snippets.</desc>
  <rect width="1200" height="760" fill="#f7f3ea"/>
  <rect x="80" y="76" width="1040" height="608" rx="26" fill="#fffdf8" stroke="#d9d0c2"/>
  <text x="128" y="148" fill="#18201f" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850">Semantic Search</text>
  <text x="128" y="186" fill="#56615f" font-family="Inter, Arial, sans-serif" font-size="18">Search private archives without sending source material to a public cloud service.</text>
  <rect x="128" y="230" width="744" height="58" rx="14" fill="#202726"/>
  <text x="158" y="267" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="20">"find budget notes with missing categories"</text>
  <rect x="892" y="230" width="180" height="58" rx="14" fill="#0d6f68"/>
  <text x="943" y="267" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Search</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="128" y="340" width="944" height="84" rx="12" fill="#f7f3ea" stroke="#d9d0c2"/>
    <text x="156" y="376" fill="#0d6f68" font-size="20" font-weight="800">Document match</text>
    <text x="156" y="404" fill="#56615f" font-size="17">Budget analysis notes • source path retained • reviewed tags only</text>
    <rect x="128" y="452" width="944" height="84" rx="12" fill="#f7f3ea" stroke="#d9d0c2"/>
    <text x="156" y="488" fill="#244c8f" font-size="20" font-weight="800">Image/OCR match</text>
    <text x="156" y="516" fill="#56615f" font-size="17">Screenshot text and image embedding both point back to the original file.</text>
    <rect x="128" y="564" width="944" height="84" rx="12" fill="#f7f3ea" stroke="#d9d0c2"/>
    <text x="156" y="600" fill="#b36b16" font-size="20" font-weight="800">Memory match</text>
    <text x="156" y="628" fill="#56615f" font-size="17">Only reviewed facts, corrections, and approvals can be reused in Q&A.</text>
  </g>
</svg>

